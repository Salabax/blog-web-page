<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wandering and Building - Lobby</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tiny-tv" aria-hidden="true">
    <div class="tv-screen">
      <span class="dvd-logo">DVD</span>
    </div>
    <div class="tv-base"></div>
  </div>

  <header class="hero lobby-hero">
    <h1>Wandering and Building</h1>
    <p>A strange little internet room.</p>
    <p class="hero-instruction">Choose a door.</p>
    <div class="hero-door-actions">
      <button id="explore-room-button" type="button">Explore the Room</button>
    </div>
    <section id="mood-panel" class="mood-panel-compact is-collapsed lobby-mood" aria-label="Mood Settings">
      <button class="mood-toggle" type="button" aria-expanded="false" aria-controls="mood-options">
        Mood Settings
        <span aria-hidden="true">+</span>
      </button>
      <div id="mood-options" class="mood-options-panel">
        <div class="mood-actions">
          <button type="button" data-mode="cyberpunk">Cyberpunk</button>
          <button type="button" data-mode="gotham-city">Gotham City</button>
          <button type="button" data-mode="pokemon-gameboy">Pokemon Gameboy</button>
        </div>
        <p id="current-mood">Current mood: Cyberpunk</p>
      </div>
    </section>
  </header>

  <main class="lobby-main">
    <section id="collective-thinking-home" class="lobby-notes">
      <h2>Room Notes</h2>
      <p>Small scraps pinned in the lobby.</p>
      <div id="collective-thinking-list" class="thought-list" data-static-only="true"></div>
      <a class="noticeboard-link" href="collective-thinking.html">Open full noticeboard</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
