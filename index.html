<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My First Blog</h1>
    <p>A simple place to practice web development.</p>
    <nav>
      <a href="#saved-posts">Posts</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="write.html">Write</a>
    </nav>
    <section class="search-section">
      <label for="post-search">Search posts</label>
      <span class="search-icon">⌕</span>
      <input id="post-search" type="search" placeholder="Search">
      <button id="clear-search" type="button" aria-label="Clear search" hidden>×</button>
      <p id="post-count"></p>
    </section>
  </header>

  <main>
    <section id="saved-posts"></section>
    <section id="older-saved-posts"></section>
    <p id="no-search-results" hidden>No posts found.</p>

    <section id="about">
      <h2>About this blog</h2>
      <p>This blog is my practice space while I learn how to build websites.</p>
    </section>

  </main>

  <footer id="contact">
    <p>Made by me while learning web development.</p>
    <h2>Contact</h2>
    <p>Instagram: <a href="https://www.instagram.com/lensbylego/" target="_blank" rel="noopener noreferrer">@lensbylego</a></p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
