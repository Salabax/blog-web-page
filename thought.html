<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Thought - Wandering and Building</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>One Thought</h1>
    <p>This old thought route is paused for now.</p>
    <p class="hint">Use Scratchpad for private notes while the Rabbit Hole Room takes shape.</p>
    <nav>
      <a href="scratchpad.html">Scratchpad</a>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main>
    <form id="thought-form" autocomplete="off">
      <label for="thought-body">Thought</label>
      <textarea id="thought-body" rows="8" maxlength="1600" required></textarea>
      <p class="hint"><span id="thought-word-count">0</span>/200 words</p>
      <button type="submit">Post anonymously</button>
    </form>
  </main>

  <footer>
    <p>Built with HTML, CSS, and JavaScript. Hosted on GitHub Pages.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
