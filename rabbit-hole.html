<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit Hole Machine - Wandering and Building</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Rabbit Hole Machine</h1>
    <p>One button. One strange direction. No feed, no pressure.</p>
    <nav>
      <a href="index.html">Lobby</a>
      <a href="object-drawer.html">Object Drawer</a>
    </nav>
  </header>

  <main>
    <section id="rabbit-hole-room" class="rabbit-hole-room">
      <div class="rabbit-machine">
        <div class="rabbit-machine-screen" aria-hidden="true">
          <span class="rabbit-machine-scanline"></span>
          <span class="rabbit-machine-status">SIGNAL READY</span>
        </div>
        <div class="rabbit-machine-copy">
          <p>Pull the machine and let it choose the next wrong turn.</p>
        </div>
        <div class="rabbit-machine-actions">
          <button id="open-rabbit-hole" class="rabbit-primary-button" type="button">🌍 Open an Internet Rabbit Hole</button>
          <button id="explore-room-button" type="button">🚪 Explore the Room</button>
          <button id="surprise-me-button" type="button">🎲 Surprise Me</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Built with HTML, CSS, and JavaScript. Hosted on GitHub Pages.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
