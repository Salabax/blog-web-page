<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Post - My First Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Write a Post</h1>
    <p>Add a new post from the browser.</p>
    <nav>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main>
    <form id="post-form" autocomplete="off">
      <label for="post-title">Title</label>
      <input id="post-title" type="text" required>

      <label for="post-image">Image</label>
      <input id="post-image" type="file" accept="image/*">
      <p class="hint">Upload a small image from your computer. Large images may not save in the browser.</p>
      <img id="image-preview" class="image-preview" alt="" hidden>

      <label for="post-body">Post</label>
      <div id="post-body" class="rich-editor" contenteditable="true" role="textbox" aria-multiline="true"></div>
      <p class="hint">Paste formatted text here, or use shortcuts like Ctrl+B and Ctrl+I.</p>

      <button type="submit">Save post</button>
    </form>
  </main>

  <footer>
    <p>Made by me while learning web development.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
